name: Frontend CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ upgrade

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20          # 🔥 FIX

      - name: Install dependencies
        run: npm install
        working-directory: todo-app

      - name: Build project
        run: npm run build
        working-directory: todo-app