name: Frontend CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug root
        run: ls -la

      - name: Debug todo-app
        run: ls -la todo-app

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: todo-app   # 🔥 only here

      - name: Build project
        run: npm run build
        working-directory: todo-app   # 🔥 only here